name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.ref_name }}-cla
  cancel-in-progress: false

jobs:
  CLAAssistant:
    if: github.repository == 'usebridgeai/cli'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - name: "CLA Assistant"
        if: >
          (github.event_name == 'issue_comment'
           && github.event.issue.pull_request
           && (github.event.comment.body == 'recheck'
               || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'v1/cla.json'
          path-to-document: 'https://gist.github.com/gbeslic/98eb4f38203a94812c3ffc6630a90dab'
          branch: 'cla-signatures'
          allowlist: gbeslic,dependabot[bot],github-actions[bot]
          lock-pullrequest-aftermerge: false
